name: Deploy Databricks bundle

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy bundle to Databricks
    runs-on: ubuntu-latest
    environment: databricks-prod

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      SQL_WAREHOUSE_ID: ${{ vars.DATABRICKS_SQL_WAREHOUSE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate -t prod --var="sql_warehouse_id=${SQL_WAREHOUSE_ID}"

      - name: Deploy bundle
        run: databricks bundle deploy -t prod --var="sql_warehouse_id=${SQL_WAREHOUSE_ID}"
