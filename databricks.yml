bundle:
  name: football_analytics

include:
  - resources/*.yml

variables:
  cluster_id:
    description: Existing all-purpose or job cluster ID used to run notebook tasks.
  catalog:
    description: Unity Catalog catalog for managed football analytics tables.
    default: football_analytics
  bronze_schema:
    description: Unity Catalog schema for Bronze ingestion tables.
    default: bronze
  silver_schema:
    description: Unity Catalog schema for Silver normalized tables.
    default: silver
  gold_schema:
    description: Unity Catalog schema for Gold feature tables.
    default: gold
  ops_schema:
    description: Unity Catalog schema for audit, checkpoint, and dead-letter tables.
    default: ops
  fixture_id:
    description: Optional API-Sports fixture ID for one-fixture manual runs.
    default: ""
  run_id:
    description: Optional externally supplied run ID.
    default: manual
  schedule_pause_status:
    description: Use PAUSED for dev and UNPAUSED when production scheduling is ready.
    default: PAUSED
  endpoint_max_workers:
    description: Concurrent driver-side endpoint fetch workers for Bronze ingestion.
    default: "8"
  api_rate_limit_per_minute:
    description: Driver-side API call spacing limit for Bronze ingestion; keep at or below the provider cap.
    default: "240"

workspace:
  root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: football_analytics
      bronze_schema: bronze_dev
      silver_schema: silver_dev
      gold_schema: gold_dev
      ops_schema: ops_dev
      schedule_pause_status: PAUSED

  prod:
    mode: production
    variables:
      catalog: football_analytics
      bronze_schema: bronze
      silver_schema: silver
      gold_schema: gold
      ops_schema: ops
      schedule_pause_status: PAUSED
